# yaml-language-server: $schema=https://raw.githubusercontent.com/SchemaStore/schemastore/master/src/schemas/json/github-workflow.json

name: "Release"
on:
  workflow_dispatch:
    inputs:
      bump:
        description: "Version bump type"
        required: true
        type: "choice"
        options:
          - "patch"
          - "minor"
          - "major"
permissions:
  contents: "write"
  packages: "write"
  id-token: "write"
  attestations: "write"
concurrency:
  group: "release"
  cancel-in-progress: false
env:
  IMAGE: "ghcr.io/${{ github.repository_owner }}/sungather"
jobs:
  resolve-version:
    name: "Resolve version"
    runs-on: "ubuntu-latest"
    outputs:
      tag: "${{ steps.bump.outputs.tag }}"
      version: "${{ steps.bump.outputs.version }}"
    steps:
      - name: "Checkout"
        uses: "actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd" # v6
        with:
          fetch-depth: 0
          fetch-tags: true
      - name: "Compute next version"
        id: "bump"
        env:
          BUMP: "${{ inputs.bump }}"
        run: |
          # Find latest tag matching v* prefix
          LATEST=$(git tag --list "v*" --sort=-v:refname | head -n 1)

          if [ -z "$LATEST" ]; then
            CURRENT="0.0.0"
          else
            CURRENT="${LATEST#v}"
          fi

          IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT"

          case "$BUMP" in
            major) MAJOR=$((MAJOR + 1)); MINOR=0; PATCH=0 ;;
            minor) MINOR=$((MINOR + 1)); PATCH=0 ;;
            patch) PATCH=$((PATCH + 1)) ;;
          esac

          VERSION="${MAJOR}.${MINOR}.${PATCH}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=v$VERSION" >> "$GITHUB_OUTPUT"
          echo "::notice::Bumping $BUMP: ${LATEST:-v0.0.0} -> v$VERSION"
  test:
    name: "Test"
    runs-on: "ubuntu-latest"
    steps:
      - name: "Checkout"
        uses: "actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd" # v6
      - name: "Set up Python"
        uses: "actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405" # v6
        with:
          python-version: "3.14"
      - name: "Install dependencies"
        run: |
          pip install --upgrade -r requirements.txt
          pip install pytest
      - name: "Run tests"
        run: "python -m pytest tests/ -v"
  release:
    name: "Build, push, and release"
    needs:
      - "resolve-version"
      - "test"
    runs-on: "ubuntu-latest"
    steps:
      - name: "Checkout"
        uses: "actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd" # v6

      - name: "Inject version into source"
        env:
          VERSION: "${{ needs.resolve-version.outputs.version }}"
        run: |
          printf "__version__ = '%s'\n" "$VERSION" > SunGather/version.py

      - name: "Set up Docker Buildx"
        uses: "docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd" # v4

      - name: "Login to GHCR"
        uses: "docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121" # v4
        with:
          registry: "ghcr.io"
          username: "${{ github.actor }}"
          password: "${{ secrets.GITHUB_TOKEN }}"

      - name: "Docker metadata"
        id: "meta"
        uses: "docker/metadata-action@030e881283bb7a6894de51c315a6bfe6a94e05cf" # v6
        with:
          images: "${{ env.IMAGE }}"
          tags: |
            type=semver,pattern={{version}},value=${{ needs.resolve-version.outputs.tag }}
            type=semver,pattern={{major}}.{{minor}},value=${{ needs.resolve-version.outputs.tag }}
            type=raw,value=latest

      - name: "Build and push"
        id: "push"
        uses: "docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f" # v7
        with:
          context: "."
          platforms: "linux/amd64"
          push: true
          tags: "${{ steps.meta.outputs.tags }}"
          labels: "${{ steps.meta.outputs.labels }}"
          cache-from: "type=gha"
          cache-to: "type=gha,mode=max"
          sbom: true
          provenance: "mode=max"

      - name: "Generate provenance attestation"
        uses: "actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32" # v4
        with:
          subject-name: "${{ env.IMAGE }}"
          subject-digest: "${{ steps.push.outputs.digest }}"
          push-to-registry: true

      - name: "Create git tag"
        env:
          TAG: "${{ needs.resolve-version.outputs.tag }}"
        run: |
          git tag "$TAG"
          git push origin "$TAG"

      - name: "Generate release notes"
        id: "notes"
        env:
          TAG: "${{ needs.resolve-version.outputs.tag }}"
          VERSION: "${{ needs.resolve-version.outputs.version }}"
          DIGEST: "${{ steps.push.outputs.digest }}"
          IMAGE: "${{ env.IMAGE }}"
          REPO: "${{ github.repository }}"
          RUN_ID: "${{ github.run_id }}"
          SHA: "${{ github.sha }}"
        run: |
          PREV_TAG=$(git tag --list "v*" --sort=-v:refname | sed -n '2p')
          SHORT_SHA="${SHA:0:7}"

          {
            echo 'RELEASE_NOTES<<NOTES_EOF'

            # shellcheck disable=SC2016
            printf '`%s:%s`\n' "${IMAGE}" "${VERSION}"
            # shellcheck disable=SC2016
            printf '`%s`\n\n' "${DIGEST}"

            printf '```bash\n'
            printf 'docker pull %s:%s\n' "${IMAGE}" "${VERSION}"
            printf '```\n\n'

            printf '**Platform:** linux/amd64 | **Commit:** %s | **Run:** [#%s](https://github.com/%s/actions/runs/%s)\n\n' \
              "${SHORT_SHA}" "${RUN_ID}" "${REPO}" "${RUN_ID}"

            printf '### Changes\n\n'
            if [ -n "$PREV_TAG" ]; then
              git log "${PREV_TAG}..HEAD" --pretty=format:"- %h %s" --no-merges
            else
              git log --pretty=format:"- %h %s" --no-merges
            fi
            printf '\n'
            echo 'NOTES_EOF'
          } >> "$GITHUB_ENV"

      - name: "Create GitHub Release"
        env:
          GH_TOKEN: "${{ secrets.GITHUB_TOKEN }}"
          TAG: "${{ needs.resolve-version.outputs.tag }}"
        run: |
          gh release create "$TAG" \
            --title "SunGather $TAG" \
            --notes "${RELEASE_NOTES}"
