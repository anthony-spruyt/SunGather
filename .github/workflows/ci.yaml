# yaml-language-server: $schema=https://raw.githubusercontent.com/SchemaStore/schemastore/master/src/schemas/json/github-workflow.json

name: "CI"
on:
  pull_request:
    branches:
      - "main"
  push:
    branches:
      - "main"
permissions:
  actions: "write"
  contents: "write"
  pull-requests: "write"
  security-events: "write"
  statuses: "write"
jobs:
  lint:
    uses: "anthony-spruyt/repo-operator/.github/workflows/_lint.yaml@main"
    secrets: "inherit"
  build-and-test:
    name: "Build and test"
    needs: "lint"
    runs-on: "ubuntu-latest"
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@fe104658747b27e96e4f7e80cd0a94068e53901d
        with:
          egress-policy: audit

      - name: "Checkout"
        uses: "actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10" # v6

      - name: "Set up Docker Buildx"
        uses: "docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c" # v4

      - name: "Build test image"
        uses: "docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf" # v7
        with:
          context: "."
          target: "test"
          push: false
          load: true
          tags: "sungather:test"
          cache-from: "type=gha"

      - name: "Run tests"
        run: |
          docker run --rm \
            -w /opt/sungather \
            -v "${{ github.workspace }}/tests:/opt/sungather/tests:ro" \
            sungather:test \
            /opt/virtualenv/bin/python -m pytest tests/ -v

  summary:
    needs:
      - "lint"
      - "build-and-test"
    if: "always()"
    uses: "anthony-spruyt/repo-operator/.github/workflows/_summary.yaml@main"
