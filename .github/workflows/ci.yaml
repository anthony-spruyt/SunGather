# yaml-language-server: $schema=https://raw.githubusercontent.com/SchemaStore/schemastore/master/src/schemas/json/github-workflow.json

name: "CI"
on:
  pull_request:
    branches:
      - "main"
  push:
    branches:
      - "main"
permissions:
  actions: "write"
  contents: "write"
  pull-requests: "write"
  security-events: "write"
  statuses: "write"
jobs:
  lint:
    name: "MegaLinter"
    runs-on: "ubuntu-latest"
    concurrency:
      group: "${{ github.workflow }}-lint-${{ github.ref }}"
      cancel-in-progress: true
    steps:
      - name: "Checkout"
        uses: "actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd" # v6
        with:
          fetch-depth: 0

      - name: "Run MegaLinter"
        env:
          GITHUB_TOKEN: "${{ secrets.GITHUB_TOKEN }}"
          VALIDATE_ALL_CODEBASE: "${{ github.event_name != 'pull_request' }}"
        run: "./lint.sh --ci"

      - name: "Upload SARIF to GitHub Security"
        if: >-
          (success() || failure())
          && hashFiles('megalinter-reports/megalinter-report.sarif') != ''
          && github.event.repository.visibility == 'public'
        uses: "github/codeql-action/upload-sarif@05b1a5d28f8763fd11e77388fe57846f1ba8e766"
        with:
          sarif_file: "megalinter-reports/megalinter-report.sarif"
  build:
    name: "Build, test, and scan"
    needs: "lint"
    runs-on: "ubuntu-latest"
    steps:
      - name: "Checkout"
        uses: "actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd" # v6

      - name: "Set up Docker Buildx"
        uses: "docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd" # v4

      - name: "Build test image"
        uses: "docker/build-push-action@d08e5c354a6adb9ed34480a06d141179aa583294" # v7
        with:
          context: "."
          target: "test"
          push: false
          load: true
          tags: "sungather:test"
          cache-from: "type=gha"

      - name: "Run tests"
        run: |
          docker run --rm \
            -w /opt/sungather \
            -v "${{ github.workspace }}/tests:/opt/sungather/tests:ro" \
            sungather:test \
            /opt/virtualenv/bin/python -m pytest tests/ -v

      - name: "Build production image"
        uses: "docker/build-push-action@d08e5c354a6adb9ed34480a06d141179aa583294" # v7
        with:
          context: "."
          push: false
          load: true
          tags: "sungather:ci"
          cache-from: "type=gha"
          cache-to: "type=gha,mode=max"

      - name: "Scan for vulnerabilities"
        uses: "aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1" # v0.29
        with:
          image-ref: "sungather:ci"
          scanners: "vuln,secret,misconfig"
          format: "table"
          exit-code: "1"
          severity: "CRITICAL,HIGH"
          ignore-unfixed: true
          trivyignores: ".trivyignore.yaml"

  summary:
    needs:
      - "lint"
      - "build"
    if: "always()"
    uses: "anthony-spruyt/repo-operator/.github/workflows/_summary.yaml@main"
